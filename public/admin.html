<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMUR.SHOP | Админка</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

    <header>
        <div class="container header-wrap">
            <div class="logo">TIMUR<span>.SHOP</span> <span class="admin-badge">Админ</span></div>
            <a href="/" class="back-link">← На сайт</a>
        </div>
    </header>

    <div class="admin-container container">
        <h1 class="admin-title">Управление товарами</h1>

        <div class="admin-form-card">
            <h2 id="form-title">Добавить товар</h2>
            <form id="product-form" onsubmit="saveProduct(event)">
                <input type="hidden" id="edit-id" value="">
                <div class="form-row">
                    <input type="text" id="f-name" class="input-field" placeholder="Название товара *" required>
                    <input type="number" id="f-price" class="input-field" placeholder="Цена (₽) *" min="1" required>
                </div>
                <div class="form-row">
                    <input type="text" id="f-desc" class="input-field" placeholder="Описание">
                    <select id="f-category" class="input-field" required>
                        <option value="">Выберите категорию *</option>
                        <option value="accessories">Аксессуары</option>
                        <option value="wallets">Кошельки</option>
                        <option value="belts">Ремни</option>
                        <option value="covers">Чехлы и обложки</option>
                        <option value="bags">Сумки</option>
                    </select>
                </div>
                <div class="form-row-full">
                    <div class="file-upload">
                        <label class="file-label" for="f-images">📷 Фото товара (можно выбрать несколько)</label>
                        <input type="file" id="f-images" name="images" accept="image/*" multiple onchange="previewImages(this)">
                        <div id="new-images-preview" class="images-preview"></div>
                    </div>
                </div>
                <div id="edit-images-section" style="display:none">
                    <p class="edit-images-label">Текущие фото товара:</p>
                    <div id="edit-images-grid" class="edit-images-grid"></div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-save" id="btn-save">Добавить</button>
                    <button type="button" class="btn-cancel" id="btn-cancel" onclick="cancelEdit()" style="display:none">Отмена</button>
                </div>
            </form>
        </div>

        <div class="admin-table-card">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Фото</th>
                        <th>Название</th>
                        <th>Категория</th>
                        <th>Цена</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="products-table"></tbody>
            </table>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        var CATEGORIES = {
            accessories: 'Аксессуары',
            wallets: 'Кошельки',
            belts: 'Ремни',
            covers: 'Чехлы и обложки',
            bags: 'Сумки'
        };

        var editingProductId = null;

        window.onload = loadProducts;

        function loadProducts() {
            fetch('/api/products')
                .then(function (res) { return res.json(); })
                .then(function (products) {
                    var tbody = document.getElementById('products-table');
                    tbody.innerHTML = '';
                    products.forEach(function (p) {
                        var imgHtml = p.images && p.images.length > 0
                            ? '<img src="' + p.images[0] + '" class="td-thumb">'
                            : '<div class="td-no-img">📦</div>';
                        var imgCount = p.images && p.images.length > 0
                            ? ' <small style="color:#666">(' + p.images.length + ' фото)</small>'
                            : '';
                        tbody.innerHTML += '<tr>' +
                            '<td>' + imgHtml + '</td>' +
                            '<td><strong>' + p.name + '</strong>' + imgCount + '<br><small style="color:#888">' + p.desc + '</small></td>' +
                            '<td>' + (CATEGORIES[p.category] || p.category) + '</td>' +
                            '<td class="td-price">' + p.price.toLocaleString('ru-RU') + ' ₽</td>' +
                            '<td class="td-actions">' +
                                '<button class="btn-edit" onclick="editProduct(' + p.id + ')">✏️</button>' +
                                '<button class="btn-delete" onclick="deleteProduct(' + p.id + ')">🗑️</button>' +
                            '</td>' +
                        '</tr>';
                    });
                });
        }

        function previewImages(input) {
            var preview = document.getElementById('new-images-preview');
            preview.innerHTML = '';
            if (input.files) {
                for (var i = 0; i < input.files.length; i++) {
                    (function(file) {
                        var reader = new FileReader();
                        reader.onload = function (e) {
                            preview.innerHTML += '<div class="preview-thumb-wrap"><img src="' + e.target.result + '" class="preview-thumb"></div>';
                        };
                        reader.readAsDataURL(file);
                    })(input.files[i]);
                }
            }
        }

        function renderEditImages(images) {
            var grid = document.getElementById('edit-images-grid');
            var section = document.getElementById('edit-images-section');
            grid.innerHTML = '';
            if (!images || images.length === 0) {
                section.style.display = 'none';
                return;
            }
            section.style.display = 'block';
            images.forEach(function (src) {
                grid.innerHTML += '<div class="edit-img-item">' +
                    '<img src="' + src + '" class="edit-img-thumb">' +
                    '<button type="button" class="edit-img-remove" onclick="removeImage(\'' + src + '\')">✕</button>' +
                '</div>';
            });
        }

        function removeImage(src) {
            if (!editingProductId) return;
            if (!confirm('Удалить это фото?')) return;
            fetch('/api/products/' + editingProductId + '/images', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: src })
            })
            .then(function (res) { return res.json(); })
            .then(function () {
                showToast('Фото удалено');
                editProduct(editingProductId);
            });
        }

        function saveProduct(e) {
            e.preventDefault();
            var id = document.getElementById('edit-id').value;
            var formData = new FormData();
            formData.append('name', document.getElementById('f-name').value);
            formData.append('desc', document.getElementById('f-desc').value);
            formData.append('price', document.getElementById('f-price').value);
            formData.append('category', document.getElementById('f-category').value);
            var fileInput = document.getElementById('f-images');
            if (fileInput.files) {
                for (var i = 0; i < fileInput.files.length; i++) {
                    formData.append('images', fileInput.files[i]);
                }
            }

            var url = id ? '/api/products/' + id : '/api/products';
            var method = id ? 'PUT' : 'POST';

            fetch(url, { method: method, body: formData })
            .then(function (res) { return res.json(); })
            .then(function () {
                showToast(id ? 'Товар обновлён' : 'Товар добавлен');
                cancelEdit();
                loadProducts();
            });
        }

        function editProduct(id) {
            editingProductId = id;
            fetch('/api/products/' + id)
                .then(function (res) { return res.json(); })
                .then(function (p) {
                    document.getElementById('edit-id').value = p.id;
                    document.getElementById('f-name').value = p.name;
                    document.getElementById('f-desc').value = p.desc;
                    document.getElementById('f-price').value = p.price;
                    document.getElementById('f-category').value = p.category;
                    document.getElementById('new-images-preview').innerHTML = '';
                    document.getElementById('f-images').value = '';
                    renderEditImages(p.images);
                    document.getElementById('form-title').textContent = 'Редактировать товар';
                    document.getElementById('btn-save').textContent = 'Сохранить';
                    document.getElementById('btn-cancel').style.display = 'inline-block';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
        }

        function deleteProduct(id) {
            if (!confirm('Удалить этот товар?')) return;
            fetch('/api/products/' + id, { method: 'DELETE' })
                .then(function () {
                    showToast('Товар удалён');
                    loadProducts();
                });
        }

        function cancelEdit() {
            editingProductId = null;
            document.getElementById('edit-id').value = '';
            document.getElementById('product-form').reset();
            document.getElementById('new-images-preview').innerHTML = '';
            document.getElementById('edit-images-section').style.display = 'none';
            document.getElementById('form-title').textContent = 'Добавить товар';
            document.getElementById('btn-save').textContent = 'Добавить';
            document.getElementById('btn-cancel').style.display = 'none';
        }

        function showToast(message) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(function () { toast.classList.remove('show'); }, 2500);
        }
    </script>
</body>
</html>
