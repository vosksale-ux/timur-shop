<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMUR.SHOP | Админка</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(10,8,6,0.95); backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
        }
        .login-overlay.hidden { display: none; }
        .login-box {
            background: var(--card); border: 1px solid var(--accent); border-radius: 12px;
            padding: 3rem 2.5rem; width: 90%; max-width: 380px; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .login-box h2 {
            font-size: 1.5rem; margin-bottom: 0.5rem; letter-spacing: 1px;
        }
        .login-box p {
            color: var(--text2); font-size: 0.9rem; margin-bottom: 2.5rem;
        }
        .login-error {
            color: var(--danger); font-size: 0.85rem; margin-top: 1rem;
            display: none;
        }
        .login-error.show { display: block; }
    </style>
</head>
<body class="admin-body">

    <div class="login-overlay" id="login-overlay">
        <div class="login-box">
            <h2>Вход</h2>
            <p>Введите пароль для доступа к админке</p>
            <form onsubmit="checkPassword(event)">
                <input type="password" id="admin-pass" class="input-field" placeholder="Пароль" required autocomplete="current-password">
                <button type="submit" class="btn-save" style="width:100%">Войти</button>
            </form>
            <div class="login-error" id="login-error">Неверный пароль</div>
        </div>
    </div>

    <header>
        <div class="container header-wrap">
            <div class="logo">TIMUR<span>.SHOP</span> <span class="admin-badge">Админ</span></div>
            <button class="burger" id="burger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <nav class="nav-links" id="nav-links">
                <a href="/">← На сайт</a>
                <a href="#" onclick="logout()" id="logout-link" style="display:none">Выйти</a>
            </nav>
        </div>
    </header>

    <div class="admin-container container">
        <h1 class="admin-title">Управление товарами</h1>

        <div class="admin-form-card" style="margin-bottom:2rem">
            <h2>Видео «О нас»</h2>
            <p style="color:var(--text2);font-size:0.85rem;margin-bottom:1rem">Это видео отображается на странице «О нас» в секции «Видео из мастерской».</p>
            <div id="video-current" style="margin-bottom:1rem"></div>
            <form id="video-form" onsubmit="uploadVideo(event)" style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:flex-end">
                <div style="flex:1;min-width:200px">
                    <label class="file-label" for="video-file">Загрузить видео (MP4)</label>
                    <input type="file" id="video-file" accept="video/mp4,video/webm" class="input-field" style="padding:0.5rem">
                </div>
                <span style="color:var(--text2);font-size:0.85rem;padding:0.75rem 0">или</span>
                <div style="flex:1;min-width:200px">
                    <input type="url" id="video-url" class="input-field" placeholder="URL видео (YouTube, Vimeo...)">
                </div>
                <button type="submit" class="btn-save" style="white-space:nowrap">Сохранить</button>
                <button type="button" class="btn-cancel" id="btn-video-delete" onclick="deleteVideo()" style="display:none">Удалить</button>
            </form>
        </div>

        <div class="admin-form-card">
            <h2 id="form-title">Добавить товар</h2>
            <form id="product-form" onsubmit="saveProduct(event)">
                <input type="hidden" id="edit-id" value="">
                <div class="form-row">
                    <input type="text" id="f-name" class="input-field" placeholder="Название товара *" required>
                    <input type="number" id="f-price" class="input-field" placeholder="Цена (₽) *" min="1" required>
                </div>
                <div class="form-row">
                    <input type="text" id="f-desc" class="input-field" placeholder="Описание">
                    <select id="f-category" class="input-field" required>
                        <option value="">Выберите категорию *</option>
                        <option value="accessories">Аксессуары</option>
                        <option value="wallets">Кошельки</option>
                        <option value="belts">Ремни</option>
                        <option value="covers">Чехлы и обложки</option>
                        <option value="bags">Сумки</option>
                    </select>
                </div>
                <div class="form-row-full">
                    <div class="file-upload">
                        <label class="file-label" for="f-images">Фото товара (можно выбрать несколько)</label>
                        <input type="file" id="f-images" name="images" accept="image/*" multiple onchange="previewImages(this)">
                        <div id="new-images-preview" class="images-preview"></div>
                    </div>
                </div>
                <div id="edit-images-section" style="display:none">
                    <p class="edit-images-label">Текущие фото товара:</p>
                    <div id="edit-images-grid" class="edit-images-grid"></div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-save" id="btn-save">Добавить</button>
                    <button type="button" class="btn-cancel" id="btn-cancel" onclick="cancelEdit()" style="display:none">Отмена</button>
                </div>
            </form>
        </div>

        <div class="admin-table-card">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Фото</th>
                        <th>Название</th>
                        <th>Категория</th>
                        <th>Цена</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="products-table"></tbody>
            </table>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        var ADMIN_TOKEN_KEY = 'timur_admin_token';

        function toggleMenu() {
            document.getElementById('burger').classList.toggle('active');
            document.getElementById('nav-links').classList.toggle('open');
        }

        document.querySelectorAll('#nav-links a').forEach(function(link) {
            link.addEventListener('click', function() {
                document.getElementById('burger').classList.remove('active');
                document.getElementById('nav-links').classList.remove('open');
            });
        });

        var CATEGORIES = {
            accessories: 'Аксессуары',
            wallets: 'Кошельки',
            belts: 'Ремни',
            covers: 'Чехлы и обложки',
            bags: 'Сумки'
        };

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function checkPassword(e) {
            e.preventDefault();
            var pass = document.getElementById('admin-pass').value;
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass })
            })
            .then(function(res) {
                if (!res.ok) throw new Error('Неверный пароль');
                return res.json();
            })
            .then(function(data) {
                sessionStorage.setItem(ADMIN_TOKEN_KEY, data.token);
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('logout-link').style.display = 'inline';
                loadProducts();
            })
            .catch(function() {
                document.getElementById('login-error').classList.add('show');
                document.getElementById('admin-pass').value = '';
            });
        }

        function logout() {
            sessionStorage.removeItem(ADMIN_TOKEN_KEY);
            location.reload();
        }

        function getAuthHeaders() {
            var token = sessionStorage.getItem(ADMIN_TOKEN_KEY);
            return { 'Authorization': 'Bearer ' + token };
        }

        (function checkAuth() {
            var token = sessionStorage.getItem(ADMIN_TOKEN_KEY);
            if (token) {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('logout-link').style.display = 'inline';
                loadProducts();
            } else {
                document.getElementById('login-overlay').classList.remove('hidden');
                document.getElementById('logout-link').style.display = 'none';
                document.getElementById('admin-pass').focus();
            }
        })();

        var editingProductId = null;

        function loadProducts() {
            fetch('/api/products')
                .then(function (res) {
                    if (!res.ok) throw new Error('Ошибка загрузки');
                    return res.json();
                })
                .then(function (products) {
                    var tbody = document.getElementById('products-table');
                    tbody.innerHTML = '';
                    products.forEach(function (p) {
                        var imgHtml = p.images && p.images.length > 0
                            ? '<img src="' + escapeHtml(p.images[0]) + '" class="td-thumb">'
                            : '<div class="td-no-img">📦</div>';
                        var imgCount = p.images && p.images.length > 0
                            ? ' <small style="color:#666">(' + p.images.length + ' фото)</small>'
                            : '';
                        var row = document.createElement('tr');
                        row.innerHTML =
                            '<td>' + imgHtml + '</td>' +
                            '<td><strong>' + escapeHtml(p.name) + '</strong>' + imgCount + '<br><small style="color:#888">' + escapeHtml(p.desc) + '</small></td>' +
                            '<td>' + (CATEGORIES[p.category] || escapeHtml(p.category)) + '</td>' +
                            '<td class="td-price">' + p.price.toLocaleString('ru-RU') + ' ₽</td>' +
                            '<td class="td-actions">' +
                                '<button class="btn-edit" data-id="' + p.id + '">✏️</button>' +
                                '<button class="btn-delete" data-id="' + p.id + '">🗑️</button>' +
                            '</td>';
                        row.querySelector('.btn-edit').addEventListener('click', function() { editProduct(p.id); });
                        row.querySelector('.btn-delete').addEventListener('click', function() { deleteProduct(p.id); });
                        tbody.appendChild(row);
                    });
                })
                .catch(function (err) {
                    showToast('Ошибка загрузки товаров');
                });
        }

        function previewImages(input) {
            var preview = document.getElementById('new-images-preview');
            preview.innerHTML = '';
            if (input.files) {
                for (var i = 0; i < input.files.length; i++) {
                    (function(file) {
                        var reader = new FileReader();
                        reader.onload = function (e) {
                            var wrap = document.createElement('div');
                            wrap.className = 'preview-thumb-wrap';
                            var img = document.createElement('img');
                            img.src = e.target.result;
                            img.className = 'preview-thumb';
                            wrap.appendChild(img);
                            preview.appendChild(wrap);
                        };
                        reader.readAsDataURL(file);
                    })(input.files[i]);
                }
            }
        }

        function renderEditImages(images) {
            var grid = document.getElementById('edit-images-grid');
            var section = document.getElementById('edit-images-section');
            grid.innerHTML = '';
            if (!images || images.length === 0) {
                section.style.display = 'none';
                return;
            }
            section.style.display = 'block';
            images.forEach(function (src) {
                var item = document.createElement('div');
                item.className = 'edit-img-item';
                var img = document.createElement('img');
                img.src = src;
                img.className = 'edit-img-thumb';
                item.appendChild(img);
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'edit-img-remove';
                btn.textContent = '✕';
                btn.addEventListener('click', function() { removeImage(src); });
                item.appendChild(btn);
                grid.appendChild(item);
            });
        }

        function removeImage(src) {
            if (!editingProductId) return;
            if (!confirm('Удалить это фото?')) return;
            fetch('/api/products/' + editingProductId + '/images', {
                method: 'DELETE',
                headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeaders()),
                body: JSON.stringify({ image: src })
            })
            .then(function (res) { return res.json(); })
            .then(function () {
                showToast('Фото удалено');
                editProduct(editingProductId);
            });
        }

        function saveProduct(e) {
            e.preventDefault();
            var id = document.getElementById('edit-id').value;

            var name = document.getElementById('f-name').value.trim();
            var desc = document.getElementById('f-desc').value.trim();
            var priceStr = document.getElementById('f-price').value.trim();
            var category = document.getElementById('f-category').value;

            if (!name) {
                showToast('Введите название товара');
                document.getElementById('f-name').focus();
                return;
            }

            if (!priceStr) {
                showToast('Введите цену товара');
                document.getElementById('f-price').focus();
                return;
            }

            var price = Number(priceStr);
            if (isNaN(price) || price <= 0) {
                showToast('Цена должна быть положительным числом');
                document.getElementById('f-price').focus();
                return;
            }

            if (!category) {
                showToast('Выберите категорию');
                document.getElementById('f-category').focus();
                return;
            }

            var formData = new FormData();
            formData.append('name', name);
            formData.append('desc', desc);
            formData.append('price', priceStr);
            formData.append('category', category);
            var fileInput = document.getElementById('f-images');
            if (fileInput.files) {
                for (var i = 0; i < fileInput.files.length; i++) {
                    formData.append('images', fileInput.files[i]);
                }
            }

            var url = id ? '/api/products/' + id : '/api/products';
            var method = id ? 'PUT' : 'POST';

            fetch(url, { method: method, body: formData, headers: getAuthHeaders() })
            .then(function (res) {
                return res.json().then(function(data) {
                    if (!res.ok) throw new Error(data.error || 'Ошибка сохранения');
                    return data;
                });
            })
            .then(function (data) {
                showToast(id ? 'Товар обновлён' : 'Товар добавлен');
                cancelEdit();
                loadProducts();
            })
            .catch(function (err) {
                showToast('Ошибка сохранения: ' + err.message);
            });
        }

        function editProduct(id) {
            editingProductId = id;
            fetch('/api/products/' + id)
                .then(function (res) { return res.json(); })
                .then(function (p) {
                    document.getElementById('edit-id').value = p.id;
                    document.getElementById('f-name').value = p.name;
                    document.getElementById('f-desc').value = p.desc;
                    document.getElementById('f-price').value = p.price;
                    document.getElementById('f-category').value = p.category;
                    document.getElementById('new-images-preview').innerHTML = '';
                    document.getElementById('f-images').value = '';
                    renderEditImages(p.images);
                    document.getElementById('form-title').textContent = 'Редактировать товар';
                    document.getElementById('btn-save').textContent = 'Сохранить';
                    document.getElementById('btn-cancel').style.display = 'inline-block';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
        }

        function deleteProduct(id) {
            if (!confirm('Удалить этот товар?')) return;
            fetch('/api/products/' + id, {
                method: 'DELETE',
                headers: getAuthHeaders()
            })
            .then(function () {
                showToast('Товар удалён');
                loadProducts();
            });
        }

        function cancelEdit() {
            editingProductId = null;
            document.getElementById('edit-id').value = '';
            document.getElementById('product-form').reset();
            document.getElementById('new-images-preview').innerHTML = '';
            document.getElementById('edit-images-section').style.display = 'none';
            document.getElementById('form-title').textContent = 'Добавить товар';
            document.getElementById('btn-save').textContent = 'Добавить';
            document.getElementById('btn-cancel').style.display = 'none';
        }

        function showToast(message) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(function () { toast.classList.remove('show'); }, 2500);
        }

        function loadVideo() {
            fetch('/api/site-data')
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    var wrap = document.getElementById('video-current');
                    var btn = document.getElementById('btn-video-delete');
                    if (data.video) {
                        if (data.video.match(/\.(mp4|webm)(\?|$)/i)) {
                            wrap.innerHTML = '<video src="' + escapeHtml(data.video) + '" controls style="width:100%;max-width:480px;border-radius:8px;margin-top:0.5rem"></video>';
                        } else {
                            wrap.innerHTML = '<div style="margin-top:0.5rem;padding:1rem;background:var(--bg2);border-radius:8px;color:var(--accent2);word-break:break-all"><strong>URL:</strong> ' + escapeHtml(data.video) + '</div>';
                        }
                        btn.style.display = 'inline-block';
                    } else {
                        wrap.innerHTML = '<p style="color:var(--text2);font-size:0.85rem;margin-top:0.5rem">Видео не загружено</p>';
                        btn.style.display = 'none';
                    }
                });
        }

        function uploadVideo(e) {
            e.preventDefault();
            var fileInput = document.getElementById('video-file');
            var urlInput = document.getElementById('video-url');

            if (fileInput.files && fileInput.files.length > 0) {
                var formData = new FormData();
                formData.append('video', fileInput.files[0]);
                fetch('/api/site-data/video', { method: 'POST', body: formData, headers: getAuthHeaders() })
                    .then(function (res) { return res.json(); })
                    .then(function (data) {
                        if (data.error) throw new Error(data.error);
                        showToast('Видео загружено');
                        loadVideo();
                        fileInput.value = '';
                        urlInput.value = '';
                    })
                    .catch(function (err) { showToast('Ошибка: ' + err.message); });
            } else if (urlInput.value.trim()) {
                fetch('/api/site-data/video', {
                    method: 'POST',
                    headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeaders()),
                    body: JSON.stringify({ url: urlInput.value.trim() })
                })
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    if (data.error) throw new Error(data.error);
                    showToast('Видео сохранено');
                    loadVideo();
                    urlInput.value = '';
                    fileInput.value = '';
                })
                .catch(function (err) { showToast('Ошибка: ' + err.message); });
            } else {
                showToast('Выберите файл или введите URL');
            }
        }

        function deleteVideo() {
            if (!confirm('Удалить видео?')) return;
            fetch('/api/site-data/video', { method: 'DELETE', headers: getAuthHeaders() })
                .then(function () {
                    showToast('Видео удалено');
                    loadVideo();
                });
        }

        loadVideo();
    </script>
</body>
</html>
